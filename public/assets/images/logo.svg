<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Trinexus triangular logo placeholder -->
  <defs>
    <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main triangle -->
  <polygon points="60,10 110,100 10,100" fill="#0A2540"/>
  <!-- Inner triangle 1 -->
  <polygon points="60,25 95,90 25,90" fill="url(#teal-gradient)" opacity="0.9"/>
  <!-- Inner triangle 2 (inverted) -->
  <polygon points="60,70 77.5,40 42.5,40" fill="url(#gold-gradient)" opacity="0.8"/>
</svg>
